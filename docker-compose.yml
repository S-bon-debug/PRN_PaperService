version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jts_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount the sql scripts to a subfolder so postgres doesn't auto-run them blindly
      - ../db-scripts:/docker-entrypoint-initdb.d/scripts
      # Mount our custom shell script directly to initdb.d to execute the scripts correctly
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/00_init_dbs.sh
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: jts_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jts.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: always

volumes:
  pgdata:
